<!DOCTYPE html>
<html>
<head>
  <title>Image File Studio Pro+</title>

  <!-- PWA -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a22">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      background: #0f0f14;
      color: white;
      font-family: monospace;
    }

    #sidebar {
      width: 320px;
      background: #1a1a22;
      padding: 10px;
      overflow: auto;
    }

    #viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #0f0f14;
      position: relative;
    }

    #img {
      max-width: 95%;
      max-height: 80%;
      border-radius: 10px;
    }

    #toolbar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    button {
      background: #2a2a3a;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #3a3a50;
    }

    input {
      background: #1a1a22;
      border: 1px solid #333;
      color: white;
      padding: 6px;
      border-radius: 6px;
      width: 100%;
      margin-bottom: 8px;
    }

    .file {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px;
      cursor: pointer;
    }

    .file:hover {
      background: #2a2a3a;
    }

    .thumb {
      width: 28px;
      height: 28px;
      object-fit: cover;
      border-radius: 4px;
    }

    .folder {
      padding: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .children {
      margin-left: 12px;
      display: none;
    }

    #dropHint {
      position: absolute;
      bottom: 10px;
      opacity: 0.4;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <button onclick="openFolder()">Open Folder</button>
  <input id="search" placeholder="Search images..." />
  <div id="fileList"></div>
</div>

<div id="viewer">

  <div id="toolbar">
    <input id="renameBox" placeholder="rename image..." />
    <button onclick="renameFile()">Rename</button>
    <button onclick="deleteFile()">Delete</button>
    <button onclick="undoDelete()">Undo</button>
    <button onclick="refresh()">Refresh</button>
  </div>

  <img id="img" />
  <div id="dropHint">Drag & drop images here</div>

</div>

<script>
  let dirHandle = null;
  let currentFile = null;
  let currentBlob = null;
  let currentName = "";
  let lastDeleted = null;

  const fileList = document.getElementById("fileList");
  const img = document.getElementById("img");
  const renameBox = document.getElementById("renameBox");
  const search = document.getElementById("search");

  function isImage(name) {
    return /\.(png|jpg|jpeg|gif|webp|bmp|heic)$/i.test(name);
  }

  // 🌳 FILE TREE
  async function readDir(handle, parent) {
    for await (const entry of handle.values()) {

      if (entry.kind === "directory") {
        const folder = document.createElement("div");
        folder.textContent = "📁 " + entry.name;
        folder.className = "folder";

        const children = document.createElement("div");
        children.className = "children";

        folder.onclick = () => {
          children.style.display =
            children.style.display === "block" ? "none" : "block";
        };

        parent.appendChild(folder);
        parent.appendChild(children);

        await readDir(entry, children);
      }

      else {
        if (!isImage(entry.name)) continue;

        const file = document.createElement("div");
        file.className = "file";

        const f = await entry.getFile();

        const thumb = document.createElement("img");
        thumb.src = URL.createObjectURL(f);
        thumb.className = "thumb";

        const label = document.createElement("span");
        label.textContent = entry.name;

        file.appendChild(thumb);
        file.appendChild(label);

        file.onclick = async () => {
          currentFile = entry;
          currentName = entry.name;

          const fileData = await entry.getFile();
          currentBlob = fileData;

          img.src = URL.createObjectURL(fileData);
          renameBox.value = entry.name.replace(/\.[^.]+$/, "");
        };

        parent.appendChild(file);
      }
    }
  }

  // 📁 OPEN
  async function openFolder() {
    dirHandle = await window.showDirectoryPicker();
    fileList.innerHTML = "";
    await readDir(dirHandle, fileList);
  }

  // 🔁 REFRESH
  async function refresh() {
    if (!dirHandle) return;
    fileList.innerHTML = "";
    await readDir(dirHandle, fileList);
  }

  // ✏️ SAFE RENAME
  async function renameFile() {
    if (!currentFile || !dirHandle) return;

    const base = renameBox.value.trim();
    if (!base) return;

    const ext = "." + currentName.split(".").pop();
    const newName = base + ext;

    const newHandle = await dirHandle.getFileHandle(newName, {
      create: true
    });

    const writable = await newHandle.createWritable();
    await writable.write(currentBlob);
    await writable.close();

    currentFile = newHandle;
    currentName = newName;

    await refresh();
  }

  // 🗑️ DELETE
  async function deleteFile() {
    if (!currentFile) return;

    lastDeleted = {
      name: currentName,
      blob: currentBlob
    };

    await dirHandle.removeEntry(currentName);

    currentFile = null;
    img.src = "";

    await refresh();
  }

  // ↩️ UNDO
  async function undoDelete() {
    if (!lastDeleted) return;

    const newHandle = await dirHandle.getFileHandle(lastDeleted.name, {
      create: true
    });

    const writable = await newHandle.createWritable();
    await writable.write(lastDeleted.blob);
    await writable.close();

    lastDeleted = null;
    await refresh();
  }

  // 🔍 SEARCH
  search.addEventListener("input", () => {
    const val = search.value.toLowerCase();
    document.querySelectorAll(".file").forEach(el => {
      el.style.display =
        el.textContent.toLowerCase().includes(val) ? "flex" : "none";
    });
  });

  // 📦 DRAG & DROP IMPORT
  document.addEventListener("drop", async (e) => {
    e.preventDefault();
    if (!dirHandle) return;

    for (const file of e.dataTransfer.files) {
      if (!isImage(file.name)) continue;

      const handle = await dirHandle.getFileHandle(file.name, {
        create: true
      });

      const writable = await handle.createWritable();
      await writable.write(file);
      await writable.close();
    }

    await refresh();
  });

  document.addEventListener("dragover", e => e.preventDefault());

  // ⚡ PWA SERVICE WORKER
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }

</script>

</body>
</html>
