<!DOCTYPE html>
<html>
<head>
  <title>Image Studio Pro Plugins</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a22">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      background: #0f0f14;
      color: white;
      font-family: monospace;
    }

    #sidebar {
      width: 320px;
      background: #1a1a22;
      padding: 10px;
      overflow: auto;
    }

    #viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
    }

    #img {
      max-width: 95%;
      max-height: 80%;
      border-radius: 10px;
    }

    button {
      background: #2a2a3a;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #3a3a50;
    }

    .file {
      padding: 4px;
      cursor: pointer;
    }

    .file:hover {
      background: #2a2a3a;
    }

    #pluginPanel {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: #1a1a22;
      padding: 10px;
      border-radius: 8px;
      width: 260px;
      display: none;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <button onclick="openFolder()">Open Folder</button>
  <button onclick="togglePlugins()">Plugins 🧩</button>
  <button onclick="checkUpdate()">Check Update ⚡</button>

  <div id="fileList"></div>
</div>

<div id="viewer">
  <img id="img" />
  <div id="pluginPanel"></div>
</div>

<script>
  let dirHandle = null;
  let currentFile = null;
  let currentBlob = null;

  const fileList = document.getElementById("fileList");
  const img = document.getElementById("img");
  const pluginPanel = document.getElementById("pluginPanel");

  // =========================
  // 🧩 PLUGIN SYSTEM CORE
  // =========================

  const plugins = [];

  const API = {
    getImage: () => currentBlob,
    setImage: (url) => img.src = url,
    log: (msg) => console.log("[PLUGIN]", msg),
    addButton: (text, fn) => {
      const btn = document.createElement("button");
      btn.textContent = text;
      btn.onclick = fn;
      pluginPanel.appendChild(btn);
    }
  };

  function registerPlugin(plugin) {
    plugins.push(plugin);
    plugin.init(API);
  }

  function togglePlugins() {
    pluginPanel.style.display =
      pluginPanel.style.display === "block" ? "none" : "block";
  }

  // =========================
  // 📦 EXAMPLE PLUGIN
  // =========================

  registerPlugin({
    name: "Grayscale Mode",
    init(api) {
      api.addButton("Grayscale 🧠", () => {
        img.style.filter = "grayscale(100%)";
      });

      api.addButton("Reset", () => {
        img.style.filter = "none";
      });
    }
  });

  registerPlugin({
    name: "Zoom Tool",
    init(api) {
      let zoom = 1;

      api.addButton("Zoom +", () => {
        zoom += 0.1;
        img.style.transform = `scale(${zoom})`;
      });

      api.addButton("Zoom -", () => {
        zoom -= 0.1;
        img.style.transform = `scale(${zoom})`;
      });
    }
  });

  // =========================
  // 🌳 FILE SYSTEM
  // =========================

  function isImage(name) {
    return /\.(png|jpg|jpeg|gif|webp|bmp|heic)$/i.test(name);
  }

  async function readDir(handle, parent) {
    for await (const entry of handle.values()) {

      if (entry.kind === "file" && isImage(entry.name)) {
        const div = document.createElement("div");
        div.className = "file";
        div.textContent = "📄 " + entry.name;

        div.onclick = async () => {
          currentFile = entry;

          const file = await entry.getFile();
          currentBlob = file;

          img.src = URL.createObjectURL(file);
        };

        parent.appendChild(div);
      }
    }
  }

  async function openFolder() {
    dirHandle = await window.showDirectoryPicker();
    fileList.innerHTML = "";
    await readDir(dirHandle, fileList);
  }

  // =========================
  // ⚡ AUTO UPDATE SYSTEM
  // =========================

  let CURRENT_VERSION = "1.0.0";

  async function checkUpdate() {
    try {
      const res = await fetch("./version.json");
      const data = await res.json();

      if (data.version !== CURRENT_VERSION) {
        alert("Update found! Reloading...");
        location.reload();
      } else {
        alert("You're up to date ✔");
      }
    } catch {
      alert("No version file found");
    }
  }

  // =========================
  // 📱 PWA SERVICE WORKER
  // =========================

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }

  // auto reload on SW update
  navigator.serviceWorker?.addEventListener("controllerchange", () => {
    location.reload();
  });

</script>

</body>
</html>
